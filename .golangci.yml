version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - funcorder
    - godot
    - gosec
    - misspell
    - modernize
    - revive
    - staticcheck
  settings:
    errcheck:
      check-type-assertions: true
    misspell:
      locale: US
    revive:
      rules:
        - name: unexported-return
          disabled: true
        - name: exported
          disabled: false

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - tmpmod
      - third_party$
      - builtin$
      - examples$

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
